name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Build plugins
        run: |
          for dir in plugins/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/src/index.ts" ]; then
              npx esbuild "$dir/src/index.ts" --bundle --format=esm --outdir="$dir/dist" --external:mediafuse
            fi
          done

      - name: Create timestamped tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v$(date -u +%Y%m%d.%H%M%S)"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$tag"
          git push origin "$tag"

          body="Automated build from $(git rev-parse --short HEAD)"
          gh release create "$tag" --title "$tag" --notes "$body" plugins/*/dist/*
