name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Build plugins
        run: pnpm -r --filter './plugins/*' run build

      - name: Create timestamped tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v$(date -u +%Y%m%d.%H%M%S)"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$tag"
          git push origin "$tag"

          body="Automated build from $(git rev-parse --short HEAD)"
          gh release create "$tag" --title "$tag" --notes "$body" plugins/*/dist/*

      - name: Delete releases older than 90 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cutoff=$(date -u -d '90 days ago' +%Y-%m-%dT%H:%M:%SZ)
          gh release list --limit 100 --json tagName,createdAt -q \
            ".[] | select(.createdAt < \"$cutoff\") | .tagName" | while read -r old_tag; do
            gh release delete "$old_tag" --yes --cleanup-tag
          done
